<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!--Created a class for number one-->
    <p class="classOdd classFont"> Number 1 - I'm a class!</p>

    <!--Created an ID for number two-->
    <div id="idTwo">Number 2 - I'm one ID.</div>

    <!--Created a class for number three-->
    <p class="classOdd bigFont"> Number 3 - I'm a class, but cooler!</p>

    <!--Created an ID for number two-->
    <div id="idFour" class="classFont">Number 4 - I'm another ID.</div>

    <!--Created a class for number five-->
    <p class="classOdd classFont">Number 5 - I'm a class!</p>
    

  </body>
</html>
